<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Task</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="box">
    <h2>Edit Task</h2>

    <form th:action="@{'/update/' + ${task.id}}" method="post">

        <input type="text" name="title" th:value="${task.title}" required>
        <input type="text" name="description" th:value="${task.description}" required>
        <input type="datetime-local" name="dueDate" required>

        <select name="status">
            <option>Pending</option>
            <option>Completed</option>
        </select>

        <button>Update</button>

    </form>

</div>

</body>
</html>
