<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TASKREMINDER - Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f5f6f8;
        }

        .main {
            display: flex;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: #0f172a;
            color: white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin: 18px 0;
        }

        .logout {
            padding: 10px;
            background: red;
            text-align: center;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 180px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .task-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .task-box input, .task-box textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .task-box button {
            padding: 10px 20px;
            background: #0f7c4c;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .task-list {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #0f7c4c;
            color: white;
        }
    </style>
</head>

<body>

<div class="main">

    <div class="sidebar">
        <div>
            <h2>TASKREMINDER</h2>
            <ul>
                <li>Dashboard</li>
                <li>Tasks</li>
            </ul>
        </div>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <div class="content">

        <h1>Dashboard</h1>

        <div class="cards">
            <div class="card">Total Tasks<br><b th:text="${total}"></b></div>
            <div class="card">Completed<br><b th:text="${completed}"></b></div>
            <div class="card">Pending<br><b th:text="${pending}"></b></div>
            <div class="card">Overdue<br><b th:text="${overdue}"></b></div>
        </div>

        <div class="task-box">
            <form action="/addTask" method="post">

                <input type="hidden" name="id" th:value="${editTask != null ? editTask.id : ''}">

                <input type="text" name="title"
                       placeholder="Task Title"
                       th:value="${editTask != null ? editTask.title : ''}" required>

                <textarea name="description"
                          placeholder="Task Description"
                          th:text="${editTask != null ? editTask.description : ''}"></textarea>

                <input type="datetime-local" name="time"
                       th:value="${editTask != null ? editTask.time : ''}" required>


                <select name="status" required>
                    <option value="PENDING"
                            th:selected="${editTask != null and editTask.status == 'PENDING'}">Pending</option>

                    <option value="COMPLETED"
                            th:selected="${editTask != null and editTask.status == 'COMPLETED'}">Completed</option>

                    <option value="OVERDUE"
                            th:selected="${editTask != null and editTask.status == 'OVERDUE'}">Overdue</option>
                </select>

                <button type="submit">Add / Update Task</button>

            </form>
        </div>


        <div style="margin-bottom:15px;">
            <a href="/dashboard">All</a> |
            <a href="/filter?status=PENDING">Pending</a> |
            <a href="/filter?status=COMPLETED">Completed</a> |
            <a href="/filter?status=OVERDUE">Overdue</a>
        </div>

        <a href="/export">
            <button style="margin-bottom:15px;">Export CSV</button>
        </a>

        <div class="task-list">

            <h2>Your Tasks</h2>

            <table>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

                <tr th:each="task : ${tasks}">
                    <td th:text="${task.title}"></td>
                    <td th:text="${task.description}"></td>
                    <td th:text="${task.time}"></td>
                    <td th:text="${task.status}"></td>
                    <td>
                        <a th:href="@{/editTask(id=${task.id})}">Edit</a>
                    </td>
                </tr>

            </table>

        </div>

    </div>

</div>

</body>
</html>
